            <h3>Nala Wadaag Fariintaada</h3>

                    <label for="name">Magacaaga Full</label>
                    <input type="text" id="name" required placeholder="Gali magacaaga">
                </div>
                <div class="form-group">
                    <label for="email">Email-kaaga</label>
                    <input type="email" id="email" required placeholder="Gali Email-kaaga">
                </div>
                <div class="form-group">
                    <label for="message">Fariintaada</label>
                    <textarea id="message" rows="5" required placeholder="Halkan ku qor fariintaada..."></textarea>
                </div>
                <button type="submit" class="btn" style="border:none; cursor:pointer;">dir fariinta</button>
            </form>
        </div>
